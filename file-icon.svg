<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Document background and fold gradients -->
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>

    <!-- Matching Slate Grey Shield Gradient for app icon -->
    <linearGradient id="appShieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#475569"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <filter id="appDocShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="appGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#334155" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Document shape with folded corner -->
  <path d="M96 32 L352 32 L416 96 L416 480 L96 480 Z" fill="url(#fileGrad)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <path d="M352 32 L352 96 L416 96 Z" fill="url(#foldGrad)" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- App icon on document -->
  <g transform="translate(136, 120) scale(0.47)">
    <!-- Premium dark slate background -->
    <rect width="512" height="512" rx="108" fill="#334155"/>

    <!-- Subtle grid overlay -->
    <line x1="32" y1="128" x2="480" y2="128" stroke="#475569" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="224" x2="480" y2="224" stroke="#475569" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="320" x2="480" y2="320" stroke="#475569" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="416" x2="480" y2="416" stroke="#475569" stroke-width="1.5" opacity="0.4"/>
    <line x1="128" y1="32" x2="128" y2="480" stroke="#475569" stroke-width="1.5" opacity="0.4"/>
    <line x1="224" y1="32" x2="224" y2="480" stroke="#475569" stroke-width="1.5" opacity="0.4"/>
    <line x1="320" y1="32" x2="320" y2="480" stroke="#475569" stroke-width="1.5" opacity="0.4"/>
    <line x1="416" y1="32" x2="416" y2="480" stroke="#475569" stroke-width="1.5" opacity="0.4"/>

    <!-- Report Document -->
    <g filter="url(#appDocShadow)">
      <rect x="112" y="60" width="288" height="392" rx="24" fill="#ffffff"/>
      <rect x="112" y="60" width="288" height="60" rx="24" fill="#f8fafc"/>
      <rect x="112" y="96" width="288" height="24" fill="#f8fafc"/>
      <rect x="152" y="80" width="80" height="16" rx="8" fill="#475569"/>
      <rect x="248" y="84" width="40" height="8" rx="4" fill="#d1d5db"/>
      <rect x="152" y="145" width="208" height="10" rx="5" fill="#94a3b8" opacity="0.7"/>
      <rect x="152" y="169" width="170" height="10" rx="5" fill="#cbd5e1" opacity="0.55"/>

      <!-- Shield centered -->
      <g filter="url(#appGlow)">
        <path d="M 256 190 L 336 215 C 336 290 300 340 256 366 C 212 340 176 290 176 215 Z" fill="url(#appShieldGrad)" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
        <path d="M 235 275 L 251 291 L 282 255" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>

      <rect x="152" y="390" width="120" height="8" rx="4" fill="#cbd5e1" opacity="0.4"/>
      <rect x="152" y="408" width="160" height="8" rx="4" fill="#cbd5e1" opacity="0.3"/>
    </g>
  </g>
  
  <!-- File extension label -->
  <rect x="250" y="420" width="150" height="44" rx="8" fill="#334155"/>
  <text x="325" y="450" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#34d399" text-anchor="middle">.cyr</text>
</svg>

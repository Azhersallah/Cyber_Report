<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="fileShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#001529" flood-opacity="0.2" />
    </filter>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004c99" />
      <stop offset="100%" stop-color="#002d59" />
    </linearGradient>

    <linearGradient id="foldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#002244" />
      <stop offset="100%" stop-color="#0059b3" />
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A5F3FC" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
  </defs>

  <path d="M 96,40 L 360,40 L 432,112 L 432,472 C 432,485 421,496 408,496 L 104,496 C 91,496 80,485 80,472 L 80,56 C 80,47 91,40 96,40 Z" 
        fill="url(#bgGrad)" 
        filter="url(#fileShadow)" />

  <path d="M 360,40 L 360,112 L 432,112 Z" 
        fill="url(#foldGrad)" 
        opacity="0.9" />

  <g transform="translate(0, -10)">
    <text x="250" y="270" 
          dominant-baseline="middle" 
          text-anchor="middle" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-weight="800" 
          letter-spacing="-2">
      <tspan fill="url(#textGradient)" font-size="125">CY</tspan>
      <tspan fill="#FFFFFF" font-size="115" dx="2">r</tspan>
    </text>
  </g>

  <g transform="translate(0, 10)">
    <line x1="160" y1="360" x2="352" y2="360" stroke="#ffffff" stroke-width="2" opacity="0.15" stroke-linecap="round" />
    
    <text x="256" y="410" 
          text-anchor="middle" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="42" 
          font-weight="700" 
          fill="#FFFFFF" 
          letter-spacing="1">.cyr</text>
  </g>
</svg>

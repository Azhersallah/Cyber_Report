<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003973" />
      <stop offset="100%" stop-color="#1058a6" />
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A5F3FC" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#001529" flood-opacity="0.4" />
    </filter>

    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="140" fill="url(#bgGradient)" />
  
  <rect width="504" height="504" x="4" y="4" rx="136" fill="none" stroke="url(#borderGradient)" stroke-width="4" />
  
  <g filter="url(#softShadow)">
    <text x="50%" y="55%" 
          dominant-baseline="middle" 
          text-anchor="middle" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="800" 
          letter-spacing="-4">
      <tspan fill="url(#textGradient)" font-size="195">CY</tspan>
      <tspan fill="#FFFFFF" font-size="185" dx="2">r</tspan>
    </text>
  </g>
</svg>
